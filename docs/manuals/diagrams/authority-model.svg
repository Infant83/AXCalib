<svg xmlns="http://www.w3.org/2000/svg" width="1440" height="820" viewBox="0 0 1440 820" role="img" aria-labelledby="title desc">
  <title id="title">AXCalib 권한 중심 인증 모델</title>
  <desc id="desc">증거와 dossier가 calibration 및 Agent 제안 리포트를 거쳐 관리자 HITL에 도달하고, 권한 있는 사람만 최종 결정을 내리는 구조</desc>
  <defs>
    <style>
      .bg{fill:#f7f4ec}.card{fill:#fffdf8;stroke:#24364b;stroke-width:2}.guard{fill:#fff3d6;stroke:#bd7a18;stroke-width:3}.human{fill:#e7f2ed;stroke:#1f6d5d;stroke-width:3}.title{font:700 34px 'Segoe UI','Malgun Gothic',sans-serif;fill:#172536}.sub{font:500 18px 'Segoe UI','Malgun Gothic',sans-serif;fill:#526171}.label{font:700 20px 'Segoe UI','Malgun Gothic',sans-serif;fill:#172536}.body{font:500 16px 'Segoe UI','Malgun Gothic',sans-serif;fill:#526171}.small{font:600 14px 'Segoe UI','Malgun Gothic',sans-serif;fill:#7d5717}.arrow{stroke:#708399;stroke-width:4;fill:none;marker-end:url(#arrow)}.dash{stroke:#bd7a18;stroke-width:3;stroke-dasharray:10 8}.pill{fill:#e9eef5;stroke:#60778f;stroke-width:1.5}.num{fill:#263f64}.numtext{font:700 17px 'Segoe UI',sans-serif;fill:white;text-anchor:middle;dominant-baseline:middle}
    </style>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="9" refY="3" orient="auto" markerUnits="strokeWidth"><path d="M0,0 L0,6 L9,3 z" fill="#708399"/></marker>
  </defs>
  <rect class="bg" width="1440" height="820" rx="28"/>
  <text class="title" x="72" y="76">근거가 자격을 만들고, 보정이 판단을 맞추며, 권한 있는 사람이 인증한다</text>
  <text class="sub" x="72" y="112">Evidence qualifies. Calibration aligns. Authorized humans certify.</text>

  <rect class="card" x="65" y="210" width="220" height="250" rx="22"/>
  <circle class="num" cx="102" cy="246" r="20"/><text class="numtext" x="102" y="247">1</text>
  <text class="label" x="132" y="253">증거·Dossier</text>
  <path d="M105 310h135v92H105z M124 335h98 M124 360h78 M124 385h88" fill="none" stroke="#60778f" stroke-width="5" stroke-linecap="round"/>
  <text class="body" x="88" y="500">locator · revision · hash</text>

  <path class="arrow" d="M285 335H360"/>
  <rect class="card" x="370" y="210" width="220" height="250" rx="22"/>
  <circle class="num" cx="407" cy="246" r="20"/><text class="numtext" x="407" y="247">2</text>
  <text class="label" x="437" y="253">Calibration</text>
  <circle cx="480" cy="350" r="70" fill="none" stroke="#426b9a" stroke-width="8"/>
  <circle cx="480" cy="350" r="46" fill="none" stroke="#5b9a91" stroke-width="8"/>
  <circle cx="480" cy="350" r="18" fill="#dca13b"/>
  <text class="body" x="399" y="500">rubric · 편차 · RAG 한계</text>

  <path class="arrow" d="M590 335H665"/>
  <rect class="card" x="675" y="210" width="220" height="250" rx="22"/>
  <circle class="num" cx="712" cy="246" r="20"/><text class="numtext" x="712" y="247">3</text>
  <text class="label" x="742" y="253">Agent 제안</text>
  <rect x="724" y="300" width="120" height="105" rx="10" fill="#e9eef5" stroke="#60778f" stroke-width="3"/>
  <path d="M746 326h76 M746 352h58 M746 378h68" stroke="#60778f" stroke-width="5" stroke-linecap="round"/>
  <circle cx="720" cy="414" r="18" fill="#fff3d6" stroke="#bd7a18" stroke-width="3"/>
  <text class="body" x="703" y="500">근거 인용 · 불확실성 · report</text>

  <line class="dash" x1="947" y1="168" x2="947" y2="590"/>
  <text class="small" x="912" y="620" transform="rotate(-90 912 620)">사람 권한 경계 · notification 없이 통과 불가</text>
  <path class="arrow" d="M895 335H1000"/>

  <rect class="guard" x="1007" y="190" width="185" height="290" rx="26"/>
  <circle cx="1100" cy="298" r="45" fill="#f4c56f" stroke="#8b5a10" stroke-width="3"/>
  <path d="M1048 412h104c0-50-22-82-52-82s-52 32-52 82z" fill="#e2b663" stroke="#8b5a10" stroke-width="3"/>
  <text class="label" x="1035" y="526">관리자 HITL</text>
  <text class="body" x="1019" y="558">checklist · 알림 · 결정</text>

  <path class="arrow" d="M1192 335H1250"/>
  <rect class="human" x="1260" y="210" width="130" height="250" rx="22"/>
  <circle class="num" cx="1292" cy="246" r="20"/><text class="numtext" x="1292" y="247">4</text>
  <path d="M1300 335l20 20 38-52" fill="none" stroke="#1f6d5d" stroke-width="12" stroke-linecap="round" stroke-linejoin="round"/>
  <text class="label" x="1279" y="407">사람 확정</text>
  <text class="body" x="1274" y="438">승인/반려</text>

  <rect class="pill" x="160" y="675" width="1120" height="78" rx="39"/>
  <text class="label" x="215" y="722">등록심의와 완료평가 모두 같은 경계를 통과하며, snapshot · notification · reviewer decision은 감사 이력에 분리 기록</text>
</svg>
