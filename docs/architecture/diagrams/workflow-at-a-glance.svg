    <circle cx="1222" cy="534" r="5" fill="#FD6C6A"/>
    <text x="1240" y="539">등록/완료 RAG stage 분리</text>
    <circle cx="1222" cy="586" r="5" fill="#FD6C6A"/>
    <text x="1240" y="591">Agent는 추천만, 결정권 없음</text>
    <circle cx="1222" cy="638" r="5" fill="#FD6C6A"/>
    <text x="1240" y="643">과정 완료도 관리자 별도 확정</text>
  </g>
