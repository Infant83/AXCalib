<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" width="1600" height="1050" viewBox="0 0 1600 1050" role="img" aria-labelledby="title desc">
  <title id="title">AXCalib 교육 프로그램과 프로젝트 인증 모듈형 워크플로 구조도</title>
  <desc id="desc">교육 프로그램, 학습자 가입 목표, 프로젝트 두 단계 인증, local transaction recovery, 제한형 PPT 렌더와 hash-bound gold evidence, Qwen 및 대체 multimodal provider proxy와 exact checkpoint 검증 경계, 전달 인터페이스, 국소 파이프라인, 도메인 모듈, 사람 승인 불변조건과 개발 Wave를 보여주는 인포그래픽</desc>
  <defs>
    <filter id="shadow" x="-10%" y="-10%" width="120%" height="130%">
      <feDropShadow dx="0" dy="3" stdDeviation="5" flood-color="#172033" flood-opacity="0.12"/>
    </filter>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="8" refY="5" orient="auto" markerUnits="strokeWidth">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#556176"/>
    </marker>
    <style>
      .title { font: 700 34px Arial, 'Noto Sans KR', sans-serif; fill: #172033; }
      .subtitle { font: 400 17px Arial, 'Noto Sans KR', sans-serif; fill: #5B6578; }
      .lane-title { font: 700 18px Arial, 'Noto Sans KR', sans-serif; fill: #172033; }
      .box-title { font: 700 16px Arial, 'Noto Sans KR', sans-serif; fill: #172033; text-anchor: middle; }
      .box-note { font: 400 13px Arial, 'Noto Sans KR', sans-serif; fill: #5B6578; text-anchor: middle; }
      .panel-title { font: 700 21px Arial, 'Noto Sans KR', sans-serif; fill: #FFFFFF; }
      .panel-text { font: 400 15px Arial, 'Noto Sans KR', sans-serif; fill: #F7F8FA; }
      .wave-title { font: 700 15px Arial, 'Noto Sans KR', sans-serif; fill: #172033; text-anchor: middle; }
      .wave-note { font: 400 12px Arial, 'Noto Sans KR', sans-serif; fill: #5B6578; text-anchor: middle; }
      .arrow { stroke: #556176; stroke-width: 2.5; fill: none; marker-end: url(#arrow); }
    </style>
  </defs>

  <rect width="1600" height="1050" fill="#F7F8FA"/>
  <text x="60" y="56" class="title">AXCalib — Composable Workflow Architecture</text>
  <text x="60" y="86" class="subtitle">Versioned Program → Enrollment Goals → Project Two Gates → Authorized Completion</text>
  <rect x="1330" y="42" width="210" height="36" rx="18" fill="#172033"/>
  <text x="1435" y="66" font-family="Arial, 'Noto Sans KR', sans-serif" font-size="14" font-weight="700" fill="#FFFFFF" text-anchor="middle">v0.3-p1 · TX R1A</text>

