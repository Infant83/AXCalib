[project]
baseline = "v0.3-p1"
environment = "offline"
synthetic_only = true
config_version = "axcalib.runtime/v1alpha1"
default_profile = "offline"

[contract]
invariants_profile = "two_gate_human_authority/v1"

[interface]
locale = "ko-KR"
report_formats = ["json", "markdown"]

[profiles.offline]
storage = "filesystem"
evaluator = "mock"
notification = "recording"
registration_retrieval = "registration_lexical"
completion_retrieval = "completion_lexical"

[retrieval.registration_lexical]
adapter = "lexical"
stage = "registration"
similarity_portion = 0.0
top_k = 5
required_for_decision = false
corpus_snapshot = "synthetic-registration-v1"

[retrieval.completion_lexical]
adapter = "lexical"
stage = "completion"
similarity_portion = 0.0
top_k = 5
required_for_decision = false
corpus_snapshot = "synthetic-completion-v1"

[notifications.recording]
enabled = true
adapter = "recording"

[limits]
evaluation_timeout_seconds = 120
max_batch_items = 20
